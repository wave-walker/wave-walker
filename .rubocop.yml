plugins:
  - rubocop-capybara
  - rubocop-rails

AllCops:
  NewCops: enable
  Exclude:
    - .git/**/*
    - .github/**/*
    - bin/**/*
    - gemfiles/**/vendor/**/*
    - node_modules/**/*
    - tmp/**/*
    - vendor/**/*
    - db/schema.rb
    - db/queue_schema.rb
    - db/cable_schema.rb
    - db/cache_schema.rb

Style/ClassAndModuleChildren:
  Exclude:
    - 'test/**/*'

Style/Documentation:
  Enabled: false

Rails/CreateTableWithTimestamps:
  Enabled: false

Metrics/ParameterLists:
  Exclude:
    - 'test/**/*'

Metrics/AbcSize:
  Exclude:
    - 'db/migrate/*'

Metrics/BlockLength:
  Exclude:
    - 'test/**/*'
  
Metrics/ClassLength:
  Exclude:
    - 'test/**/*'

Layout/LineLength:
  Exclude:
    - 'db/migrate/*'

Metrics/MethodLength:
  Exclude:
    - 'db/migrate/*'
